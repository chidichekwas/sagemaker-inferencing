name: Deploy Fraud Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "pipeline.py"
      - "scripts/**"
      - "lambda/**"
      - "*.tf"
      - "tests/**"
      - ".github/workflows/deploy-pipeline.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      PIPELINE_NAME: fraud-realtime-inference-pipeline
      BUCKET_NAME: sagemaker-s3-chidi
      ACCOUNT_ID: 148622480762
      TF_IN_AUTOMATION: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        pip install "sagemaker==2.218.0" "boto3==1.34.0" pytest

    - name: Add repo to PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

    - name: Run unit tests
      run: pytest -q

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5

    - name: Terraform Init
      working-directory: .
      run: terraform init

    - name: Terraform Apply
      working-directory: .
      run: |
        terraform apply -auto-approve \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="pipeline_name=${{ env.PIPELINE_NAME }}" \
          -var="bucket_name=${{ env.BUCKET_NAME }}" \
          -var="account_id=${{ env.ACCOUNT_ID }}"

    - name: Upload scripts to S3
      run: |
        aws s3 cp scripts/inference_script_v2.py s3://${{ env.BUCKET_NAME }}/fraud/scripts/inference_script_v2.py
        aws s3 cp scripts/postprocess.py s3://${{ env.BUCKET_NAME }}/fraud/scripts/postprocess.py

    - name: Update and run SageMaker Pipeline
      run: python pipeline.py

    - name: Get latest pipeline execution ARN
      id: latest_exec
      run: |
        ARN=$(aws sagemaker list-pipeline-executions \
          --pipeline-name ${{ env.PIPELINE_NAME }} \
          --max-results 1 \
          --query "PipelineExecutionSummaries[0].PipelineExecutionArn" \
          --output text)
        echo "arn=$ARN" >> $GITHUB_OUTPUT

    - name: Notify Slack
      if: always()
      run: |
        if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
          STATUS="${{ job.status }}"
          ARN="${{ steps.latest_exec.outputs.arn }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: Fraud pipeline run *${STATUS}*.\nExecution ARN: \`${ARN}\`\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
        else
          echo "Slack webhook not set. Skipping notification."
        fi
